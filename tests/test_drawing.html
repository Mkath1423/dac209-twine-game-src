<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
		<meta charset="utf-8">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <style>

            body {
                background-color: white;
                margin: 0;
            }

            .ticket-overlay {
                position:fixed;top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;

                display: flex;


                background: rgba(255, 252, 191, 0.6);
            }

            

            .ink-bottle-layers  {
                display: grid;
                grid-template-columns: 1fr;
                grid-template-rows: 1fr;
                width: 100px;
                height: 100px;
            }


            .ink-bottle-layers > * {
                
                grid-column: 1;
                grid-row: 1;
                width: 100%;
                height: 100%;
            } 
            
            .ink-bottle-cap {
                z-index: 1;
            }
            .ink-bottle {
                filter: grayscale(1);
                z-index: -1;
            }

            .tint {
                width: 100%;
                height: 100%;
                background-color: red;
                mix-blend-mode: overlay; 
                pointer-events: none;   
                z-index: 0;
            } 


            #site {
                display: grid;
                grid-template-columns: auto 1fr 4fr 1fr auto ;
                grid-template-rows: 3fr 2fr;

                background-color: #B48C72;
                width: 100vw;
                height: 100vh;
            }

            .debug {
                border: 2px solid black;
            }

            #left-sidebar{
                grid-column: 1 ;
                grid-row: 1 / 3;
                width: 250px;
            }
            
            #right-sidebar {
                grid-column:  5;
                grid-row: 1 / 3;
                width: 250px;
                 justify-self: end;
            }
            
            #drawing-area {
                grid-column: 3;
                grid-row: 2;

                display: flex;
                justify-content: center;
                align-items: center;
            }
            
            
            #twine-area {
                grid-column: 3;
                grid-row: 1;
            }

            #drawing-canvas {
                background-color: #B08968;
                width: 50%;
                height: 50%;

            }

            


        </style>
        <script>
        </script>
        
            <template>
                
            <div class="ink-bottle-layers">
                <img class="ink-bottle" src="../assets/inkbottle.png" alt="ink!">
                <div class="tint"></div>
                <img class="ink-bottle-cap" src="../assets/inkbottle-cap.png" alt="ink!">
            </div>

            </template>
    </head>

    <body>

        <div id=site>

            

            
            <div id=left-sidebar class="debug">


                
            </div>

                <div id=twine-area class="debug">

                    <div></div>
                
                </div>

                <div id=drawing-area class="debug">
                    <canvas id="drawing-canvas"></canvas>

                    
                </div>

            
            <div id=right-sidebar class="debug">
                helloo

                
            </div>
            
        </div>
    </body>
    <script>
    $("#canvas").on("click", function(event){
        console.log("clicked!");
    })
    $(document).on("click", "button", function () {
        console.log($(this).text());
    });

    $("button.close-ticket").on("click", function(event){

        $(".ticket-overlay").css("pointer-events", "none");
        $(".ticket-overlay").fadeOut(5000);
    });
    </script>
</html>
